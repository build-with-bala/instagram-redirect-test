<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IAB Escape — Experiment Matrix</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #6366f1;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
  }

  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    padding: 16px;
    -webkit-font-smoothing: antialiased;
  }

  h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  h2 { font-size: 14px; font-weight: 600; margin-top: 24px; margin-bottom: 12px; color: var(--accent); }
  .subtitle { color: var(--text-dim); font-size: 12px; margin-bottom: 20px; }

  .detection-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .detection-panel pre {
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-dim);
  }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    margin-right: 6px;
    margin-bottom: 4px;
  }
  .tag.yes { background: rgba(63, 185, 80, 0.15); color: var(--green); border: 1px solid rgba(63, 185, 80, 0.3); }
  .tag.no { background: rgba(248, 81, 73, 0.15); color: var(--red); border: 1px solid rgba(248, 81, 73, 0.3); }
  .tag.info { background: rgba(88, 166, 255, 0.15); color: var(--blue); border: 1px solid rgba(88, 166, 255, 0.3); }

  .experiment {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
    list-style: none;
  }
  .experiment:hover { border-color: var(--accent); }
  .exp-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }
  .exp-name { font-weight: 600; font-size: 13px; }
  .exp-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .exp-desc { color: var(--text-dim); font-size: 11px; margin-bottom: 10px; }
  .exp-reliability {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    font-weight: 600; text-transform: uppercase;
  }
  .rel-high { background: rgba(63, 185, 80, 0.15); color: var(--green); }
  .rel-medium { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
  .rel-low { background: rgba(248, 81, 73, 0.15); color: var(--red); }
  .rel-very-low { background: rgba(248, 81, 73, 0.25); color: var(--red); }
  .platform-tag {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    background: rgba(88, 166, 255, 0.12); color: var(--blue);
  }
  .btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-family: inherit;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #5558e6; }

  .exp-result {
    margin-top: 8px; padding: 10px 12px; border-radius: 6px;
    font-size: 11px; display: none; white-space: pre-wrap; word-break: break-all;
  }
  .exp-result.visible { display: block; }
  .exp-result.success { background: rgba(63, 185, 80, 0.1); border: 1px solid rgba(63, 185, 80, 0.2); }
  .exp-result.pending { background: rgba(210, 153, 34, 0.1); border: 1px solid rgba(210, 153, 34, 0.2); }
  .exp-result.manual { background: rgba(88, 166, 255, 0.1); border: 1px solid rgba(88, 166, 255, 0.2); }
  .exp-result.failed { background: rgba(248, 81, 73, 0.1); border: 1px solid rgba(248, 81, 73, 0.2); }

  .controls { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }

  .event-log {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; margin-top: 20px; max-height: 300px; overflow-y: auto; font-size: 11px;
  }
  .event-log .entry { padding: 2px 0; border-bottom: 1px solid rgba(48, 54, 61, 0.5); }
  .event-log .entry:last-child { border-bottom: none; }
  .event-log .ts { color: var(--text-dim); margin-right: 8px; }
  .event-log .ev { color: var(--accent); margin-right: 8px; font-weight: 600; }

  .visibility-indicator {
    position: fixed; top: 8px; right: 8px; padding: 4px 10px;
    border-radius: 12px; font-size: 10px; font-weight: 700; z-index: 100;
    transition: all 0.3s;
  }
  .visibility-indicator.visible { background: var(--green); color: #000; }
  .visibility-indicator.hidden { background: var(--red); color: #fff; }
</style>
</head>
<body>

<div class="visibility-indicator visible" id="visIndicator">PAGE VISIBLE</div>

<h1>IAB Escape Experiment Matrix</h1>
<p class="subtitle">Test every escape mechanism. Open this page from inside Instagram's in-app browser.</p>

<h2>Environment Detection</h2>
<div class="detection-panel" id="detectionPanel">
  <div id="detectionTags"></div>
  <pre id="detectionRaw"></pre>
</div>

<h2>Controls</h2>
<div class="controls">
  <button class="btn primary" onclick="runAllSequential()">Run All (Sequential)</button>
  <button class="btn" onclick="clearAllResults()">Clear Results</button>
  <button class="btn" onclick="exportLog()">Export Log</button>
  <button class="btn" onclick="copyPageUrl()">Copy This Page URL</button>
</div>

<h2>Experiments</h2>
<ul class="experiment-list" id="experimentList"></ul>

<h2>Event Log</h2>
<div class="event-log" id="eventLog">
  <div class="entry"><span class="ts">--:--:--</span><span class="ev">ready</span>Waiting for experiments...</div>
</div>

<script src="js/detect.js"></script>
<script src="js/strategies.js"></script>
<script src="js/config.js"></script>
<script src="js/logger.js"></script>
<script>
(function() {
  'use strict';

  var det = IABDetect.detect();
  var logger = IABLogger.create({ console: true, includeUA: false });
  var startTime = Date.now();

  // --- Visibility tracking ---
  var visIndicator = document.getElementById('visIndicator');
  var visibilityLog = [];

  document.addEventListener('visibilitychange', function() {
    var state = document.visibilityState;
    visibilityLog.push({ time: Date.now() - startTime, state: state });
    logEvent('visibility', state);
    if (state === 'hidden') {
      visIndicator.className = 'visibility-indicator hidden';
      visIndicator.textContent = 'PAGE HIDDEN';
    } else {
      visIndicator.className = 'visibility-indicator visible';
      visIndicator.textContent = 'PAGE VISIBLE';
    }
  });

  // --- Detection display ---
  var tagsEl = document.getElementById('detectionTags');
  var rawEl = document.getElementById('detectionRaw');

  function tag(label, value, type) {
    var cls = type || (value ? 'yes' : 'no');
    return '<span class="tag ' + cls + '">' + label + ': ' + value + '</span>';
  }

  tagsEl.innerHTML = [
    tag('Instagram', det.isInstagram),
    tag('Platform', det.platform, 'info'),
    tag('IAB Type', det.iabType, det.iabType === 'none' ? 'no' : 'yes'),
    tag('Share API', det.hasShareApi),
    tag('Clipboard', det.hasClipboardApi),
    tag('Standalone', det.isStandalone),
    tag('Android WebView', det.isAndroidWebView),
    tag('Chrome Custom Tab', det.isChromeCustomTab),
    tag('iOS WebView', det.isIOSWebView),
  ].join('');

  rawEl.textContent = 'User-Agent: ' + det.userAgent;
  logger.log('detection', det);

  // --- Experiments definition ---
  var experiments = [
    {
      id: 'intent-chrome',
      name: 'EXP-01: Android Intent (Chrome)',
      platforms: ['android'],
      reliability: 'medium',
      description: 'intent:// scheme targeting com.android.chrome package',
      run: function(url) {
        var p = new URL(url);
        var iu = 'intent://' + p.host + p.pathname + p.search
          + '#Intent;scheme=' + p.protocol.replace(':', '')
          + ';package=com.android.chrome;end';
        window.location.href = iu;
        return { success: 'pending', method: 'intent-chrome' };
      }
    },
    {
      id: 'intent-generic',
      name: 'EXP-02: Android Intent (Generic)',
      platforms: ['android'],
      reliability: 'medium',
      description: 'intent:// without package — triggers Android app chooser',
      run: function(url) {
        var p = new URL(url);
        var iu = 'intent://' + p.host + p.pathname + p.search
          + '#Intent;scheme=' + p.protocol.replace(':', '')
          + ';action=android.intent.action.VIEW;end';
        window.location.href = iu;
        return { success: 'pending', method: 'intent-generic' };
      }
    },
    {
      id: 'intent-fallback',
      name: 'EXP-03: Intent + S.browser_fallback_url',
      platforms: ['android'],
      reliability: 'medium',
      description: 'intent:// with fallback URL parameter for graceful degradation',
      run: function(url) {
        var p = new URL(url);
        var iu = 'intent://' + p.host + p.pathname + p.search
          + '#Intent;scheme=' + p.protocol.replace(':', '')
          + ';package=com.android.chrome'
          + ';S.browser_fallback_url=' + encodeURIComponent(url)
          + ';end';
        window.location.href = iu;
        return { success: 'pending', method: 'intent-fallback' };
      }
    },
    {
      id: 'chrome-scheme',
      name: 'EXP-04: Chrome URL Scheme (deprecated)',
      platforms: ['android'],
      reliability: 'low',
      description: 'googlechrome://navigate?url= — legacy, deprecated',
      run: function(url) {
        window.location.href = 'googlechrome://navigate?url=' + encodeURIComponent(url);
        return { success: 'pending', method: 'chrome-scheme' };
      }
    },
    {
      id: 'share-api',
      name: 'EXP-05: Web Share API',
      platforms: ['android', 'ios'],
      reliability: 'high',
      description: 'navigator.share() — opens native share sheet',
      run: function(url) {
        if (!navigator.share) return { success: false, error: 'Share API unavailable' };
        return navigator.share({ title: document.title, url: url }).then(function() {
          return { success: 'pending', method: 'share-api', note: 'User completed share action' };
        }).catch(function(e) {
          return { success: false, error: e.name + ': ' + e.message };
        });
      }
    },
    {
      id: 'clipboard',
      name: 'EXP-06: Clipboard Copy',
      platforms: ['android', 'ios'],
      reliability: 'high',
      description: 'navigator.clipboard.writeText() — copies URL to clipboard',
      run: function(url) {
        if (!navigator.clipboard || !navigator.clipboard.writeText) {
          // execCommand fallback
          try {
            var ta = document.createElement('textarea');
            ta.value = url;
            ta.style.cssText = 'position:fixed;left:-9999px';
            document.body.appendChild(ta);
            ta.select();
            var ok = document.execCommand('copy');
            document.body.removeChild(ta);
            return { success: ok ? 'manual' : false, method: 'clipboard-execCommand',
                     instruction: ok ? 'URL copied — paste in browser address bar' : 'Copy failed' };
          } catch(e) { return { success: false, error: 'All clipboard methods failed' }; }
        }
        return navigator.clipboard.writeText(url).then(function() {
          return { success: 'manual', method: 'clipboard', instruction: 'URL copied — paste in browser address bar' };
        }).catch(function(e) {
          return { success: false, error: e.message };
        });
      }
    },
    {
      id: 'window-open-blank',
      name: 'EXP-07: window.open(_blank)',
      platforms: ['android', 'ios'],
      reliability: 'very-low',
      description: 'window.open(url, "_blank") — usually stays in WebView',
      run: function(url) {
        var w = window.open(url, '_blank');
        return { success: w ? 'pending' : false, method: 'window-open-blank',
                 note: w ? 'Window ref returned' : 'Blocked (null)' };
      }
    },
    {
      id: 'window-open-system',
      name: 'EXP-08: window.open(_system)',
      platforms: ['android'],
      reliability: 'very-low',
      description: 'window.open(url, "_system") — Cordova-style convention',
      run: function(url) {
        var w = window.open(url, '_system');
        return { success: w ? 'pending' : false, method: 'window-open-system',
                 note: w ? 'Window ref returned' : 'Blocked (null)' };
      }
    },
    {
      id: 'anchor-blank',
      name: 'EXP-09: Anchor target=_blank',
      platforms: ['android', 'ios'],
      reliability: 'very-low',
      description: 'Programmatic <a target="_blank" rel="noopener"> click',
      run: function(url) {
        var a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(function() { try { document.body.removeChild(a); } catch(e){} }, 200);
        return { success: 'pending', method: 'anchor-blank' };
      }
    },
    {
      id: 'location-replace-intent',
      name: 'EXP-10: location.replace(intent://)',
      platforms: ['android'],
      reliability: 'low',
      description: 'window.location.replace() with intent:// — no history entry',
      run: function(url) {
        var p = new URL(url);
        var iu = 'intent://' + p.host + p.pathname + p.search
          + '#Intent;scheme=' + p.protocol.replace(':', '')
          + ';package=com.android.chrome;end';
        window.location.replace(iu);
        return { success: 'pending', method: 'location-replace-intent' };
      }
    },
    {
      id: 'iframe-intent',
      name: 'EXP-11: Hidden iframe intent://',
      platforms: ['android'],
      reliability: 'very-low',
      description: 'Hidden <iframe src="intent://..."> — WebView may process it',
      run: function(url) {
        var p = new URL(url);
        var iu = 'intent://' + p.host + p.pathname + p.search
          + '#Intent;scheme=' + p.protocol.replace(':', '')
          + ';package=com.android.chrome;end';
        var iframe = document.createElement('iframe');
        iframe.style.cssText = 'display:none;width:0;height:0;border:0';
        iframe.src = iu;
        document.body.appendChild(iframe);
        setTimeout(function() { try { document.body.removeChild(iframe); } catch(e){} }, 3000);
        return { success: 'pending', method: 'iframe-intent' };
      }
    },
    {
      id: 'form-post-blank',
      name: 'EXP-12: Form GET target=_blank',
      platforms: ['android', 'ios'],
      reliability: 'very-low',
      description: 'Submit a <form target="_blank"> with action=URL',
      run: function(url) {
        var form = document.createElement('form');
        form.action = url;
        form.method = 'GET';
        form.target = '_blank';
        form.style.display = 'none';
        document.body.appendChild(form);
        form.submit();
        setTimeout(function() { try { document.body.removeChild(form); } catch(e){} }, 200);
        return { success: 'pending', method: 'form-get-blank' };
      }
    },
    {
      id: 'delayed-intent',
      name: 'EXP-13: Delayed Intent (500ms)',
      platforms: ['android'],
      reliability: 'low',
      description: 'intent:// fired 500ms after click — tests gesture token expiry',
      run: function(url) {
        return new Promise(function(resolve) {
          setTimeout(function() {
            var p = new URL(url);
            var iu = 'intent://' + p.host + p.pathname + p.search
              + '#Intent;scheme=' + p.protocol.replace(':', '')
              + ';package=com.android.chrome;end';
            window.location.href = iu;
            resolve({ success: 'pending', method: 'delayed-intent-500ms' });
          }, 500);
        });
      }
    },
    {
      id: 'delayed-intent-2s',
      name: 'EXP-14: Delayed Intent (2000ms)',
      platforms: ['android'],
      reliability: 'very-low',
      description: 'intent:// fired 2s after click — gesture token likely expired',
      run: function(url) {
        return new Promise(function(resolve) {
          setTimeout(function() {
            var p = new URL(url);
            var iu = 'intent://' + p.host + p.pathname + p.search
              + '#Intent;scheme=' + p.protocol.replace(':', '')
              + ';package=com.android.chrome;end';
            window.location.href = iu;
            resolve({ success: 'pending', method: 'delayed-intent-2000ms' });
          }, 2000);
        });
      }
    },
    {
      id: 'mailto-bounce',
      name: 'EXP-15: mailto: with URL in body',
      platforms: ['android', 'ios'],
      reliability: 'very-low',
      description: 'Opens email client with URL — user can tap link in email',
      run: function(url) {
        window.location.href = 'mailto:?subject=Open%20this%20link&body=' + encodeURIComponent(url);
        return { success: 'pending', method: 'mailto-bounce', note: 'Opens email, not browser' };
      }
    },
    {
      id: 'google-redirect',
      name: 'EXP-16: Google Redirect',
      platforms: ['android', 'ios'],
      reliability: 'very-low',
      description: 'Navigate through google.com/url?q= redirect wrapper',
      run: function(url) {
        window.location.href = 'https://www.google.com/url?q=' + encodeURIComponent(url) + '&sa=D&source=web';
        return { success: 'pending', method: 'google-redirect' };
      }
    },
    {
      id: 'intent-firefox',
      name: 'EXP-17: Intent → Firefox',
      platforms: ['android'],
      reliability: 'low',
      description: 'intent:// targeting org.mozilla.firefox package',
      run: function(url) {
        var p = new URL(url);
        var iu = 'intent://' + p.host + p.pathname + p.search
          + '#Intent;scheme=' + p.protocol.replace(':', '')
          + ';package=org.mozilla.firefox;end';
        window.location.href = iu;
        return { success: 'pending', method: 'intent-firefox' };
      }
    },
    {
      id: 'intent-samsung',
      name: 'EXP-18: Intent → Samsung Browser',
      platforms: ['android'],
      reliability: 'low',
      description: 'intent:// targeting com.sec.android.app.sbrowser',
      run: function(url) {
        var p = new URL(url);
        var iu = 'intent://' + p.host + p.pathname + p.search
          + '#Intent;scheme=' + p.protocol.replace(':', '')
          + ';package=com.sec.android.app.sbrowser;end';
        window.location.href = iu;
        return { success: 'pending', method: 'intent-samsung' };
      }
    },
    {
      id: 'meta-refresh',
      name: 'EXP-19: Meta Refresh inject',
      platforms: ['android', 'ios'],
      reliability: 'very-low',
      description: 'Inject <meta http-equiv="refresh"> — stays in WebView',
      run: function(url) {
        var meta = document.createElement('meta');
        meta.httpEquiv = 'refresh';
        meta.content = '0;url=' + url;
        document.head.appendChild(meta);
        setTimeout(function() { try { document.head.removeChild(meta); } catch(e){} }, 2000);
        return { success: 'pending', method: 'meta-refresh', note: 'Expected: stays in same WebView' };
      }
    },
    {
      id: 'share-files-api',
      name: 'EXP-20: Share Files API',
      platforms: ['android', 'ios'],
      reliability: 'low',
      description: 'navigator.share() with a file attachment — different share sheet targets',
      run: function(url) {
        if (!navigator.canShare) return { success: false, error: 'canShare API unavailable' };
        try {
          var file = new File([url], 'link.txt', { type: 'text/plain' });
          if (!navigator.canShare({ files: [file] })) {
            return { success: false, error: 'File sharing not supported' };
          }
          return navigator.share({
            title: 'Open this link',
            files: [file]
          }).then(function() {
            return { success: 'pending', method: 'share-files', note: 'User shared file' };
          }).catch(function(e) {
            return { success: false, error: e.name + ': ' + e.message };
          });
        } catch(e) {
          return { success: false, error: e.message };
        }
      }
    }
  ];

  // --- Render experiments ---
  var listEl = document.getElementById('experimentList');
  var targetUrl = window.location.href;

  experiments.forEach(function(exp) {
    var li = document.createElement('li');
    li.className = 'experiment';
    li.id = 'exp-' + exp.id;

    var platformAvailable = exp.platforms.indexOf(det.platform) !== -1;
    var relClass = 'rel-' + exp.reliability.replace(/ /g, '-');

    li.innerHTML =
      '<div class="exp-header">' +
        '<span class="exp-name">' + exp.name + '</span>' +
        '<button class="btn" id="btn-' + exp.id + '"' +
          (!platformAvailable ? ' disabled title="Not on ' + det.platform + '"' : '') +
        '>Run</button>' +
      '</div>' +
      '<div class="exp-meta">' +
        exp.platforms.map(function(p) { return '<span class="platform-tag">' + p + '</span>'; }).join('') +
        '<span class="exp-reliability ' + relClass + '">' + exp.reliability + '</span>' +
      '</div>' +
      '<div class="exp-desc">' + exp.description + '</div>' +
      '<div class="exp-result" id="result-' + exp.id + '"></div>';

    listEl.appendChild(li);

    document.getElementById('btn-' + exp.id).addEventListener('click', function() {
      runExperiment(exp);
    });
  });

  // --- Run single experiment ---
  function runExperiment(exp) {
    var resultEl = document.getElementById('result-' + exp.id);
    var btn = document.getElementById('btn-' + exp.id);

    logEvent('attempt', exp.id);
    btn.textContent = 'Running...';
    btn.disabled = true;
    resultEl.className = 'exp-result visible pending';
    resultEl.textContent = 'Executing...';

    var t0 = performance.now();
    var visCountBefore = visibilityLog.length;

    try {
      var result = exp.run(targetUrl);
      if (result && typeof result.then === 'function') {
        result.then(function(r) { handleResult(exp, r, t0, visCountBefore); })
              .catch(function(e) { handleResult(exp, { success: false, error: e.message }, t0, visCountBefore); });
      } else {
        setTimeout(function() { handleResult(exp, result, t0, visCountBefore); }, 1500);
      }
    } catch(e) {
      handleResult(exp, { success: false, error: e.message }, t0, visCountBefore);
    }
  }

  function handleResult(exp, result, t0, visCountBefore) {
    var elapsed = Math.round(performance.now() - t0);
    var visChanged = visibilityLog.length > visCountBefore;

    result = result || {};
    result.elapsed = elapsed + 'ms';
    result.visibilityChanged = visChanged;

    var resultEl = document.getElementById('result-' + exp.id);
    var btn = document.getElementById('btn-' + exp.id);

    var cls = 'exp-result visible ';
    if (result.success === true || (result.success === 'pending' && visChanged)) cls += 'success';
    else if (result.success === 'pending') cls += 'pending';
    else if (result.success === 'manual') cls += 'manual';
    else cls += 'failed';

    resultEl.className = cls;
    resultEl.textContent = JSON.stringify(result, null, 2);
    btn.textContent = 'Run Again';
    btn.disabled = false;

    logEvent('result', { experiment: exp.id, result: result });
    logger.log('experiment-result', { id: exp.id, result: result });
  }

  // --- Run all sequential ---
  var running = false;
  window.runAllSequential = async function() {
    if (running) return;
    running = true;

    for (var i = 0; i < experiments.length; i++) {
      var exp = experiments[i];
      if (exp.platforms.indexOf(det.platform) === -1) continue;

      logEvent('run-all', 'Starting ' + exp.id);

      await new Promise(function(resolve) {
        var resultEl = document.getElementById('result-' + exp.id);
        var btn = document.getElementById('btn-' + exp.id);
        btn.textContent = 'Running...';
        btn.disabled = true;
        resultEl.className = 'exp-result visible pending';
        resultEl.textContent = 'Executing...';

        var t0 = performance.now();
        var visCountBefore = visibilityLog.length;

        try {
          var result = exp.run(targetUrl);
          if (result && typeof result.then === 'function') {
            result.then(function(r) {
              handleResult(exp, r, t0, visCountBefore);
              setTimeout(resolve, 800);
            }).catch(function(e) {
              handleResult(exp, { success: false, error: e.message }, t0, visCountBefore);
              setTimeout(resolve, 800);
            });
          } else {
            setTimeout(function() {
              handleResult(exp, result, t0, visCountBefore);
              setTimeout(resolve, 800);
            }, 2000);
          }
        } catch(e) {
          handleResult(exp, { success: false, error: e.message }, t0, visCountBefore);
          setTimeout(resolve, 800);
        }
      });
    }
    running = false;
    logEvent('run-all', 'Complete');
  };

  // --- Utilities ---
  window.clearAllResults = function() {
    experiments.forEach(function(exp) {
      var r = document.getElementById('result-' + exp.id);
      var b = document.getElementById('btn-' + exp.id);
      r.className = 'exp-result';
      r.textContent = '';
      b.textContent = 'Run';
      b.disabled = exp.platforms.indexOf(det.platform) === -1;
    });
    logEvent('clear', 'Results cleared');
  };

  window.exportLog = function() {
    var data = {
      detection: det,
      events: logger.getEvents(),
      visibility: visibilityLog,
      timestamp: new Date().toISOString(),
      url: window.location.href
    };
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'iab-escape-log-' + Date.now() + '.json';
    a.click();
    logEvent('export', 'Log exported');
  };

  window.copyPageUrl = function() {
    var url = window.location.href;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(function() {
        logEvent('copy', 'Page URL copied');
        alert('URL copied to clipboard');
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = url;
      ta.style.cssText = 'position:fixed;left:-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      logEvent('copy', 'URL copied (fallback)');
      alert('URL copied to clipboard');
    }
  };

  // --- Event log display ---
  var eventLogEl = document.getElementById('eventLog');
  function logEvent(name, data) {
    var now = new Date();
    var ts = [now.getHours(), now.getMinutes(), now.getSeconds()]
      .map(function(n) { return String(n).padStart(2, '0'); }).join(':')
      + '.' + String(now.getMilliseconds()).padStart(3, '0');

    var str = typeof data === 'object' ? JSON.stringify(data) : String(data);
    var div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = '<span class="ts">' + ts + '</span><span class="ev">' + name + '</span>' + str;
    eventLogEl.appendChild(div);
    eventLogEl.scrollTop = eventLogEl.scrollHeight;
  }

  logEvent('init', 'Detection: ' + det.iabType + ' on ' + det.platform);
})();
</script>
</body>
</html>
